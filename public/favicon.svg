<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff5cc" />
      <stop offset="30%" stop-color="#ffd700" />
      <stop offset="70%" stop-color="#ff7700" />
      <stop offset="100%" stop-color="#a31d1d" />
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#ff5500" flood-opacity="0.35"/>
    </filter>
  </defs>
  
  <!-- Outer glowing rings -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#goldGlow)" stroke-width="4" stroke-dasharray="10, 8" opacity="0.4" />
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#goldGlow)" stroke-width="2" opacity="0.2" />

  <!-- Main Dragon Silhouette -->
  <g filter="url(#shadow)" transform="translate(0, 0)">
    <!-- Dragon Wing (Left/Behind) -->
    <path d="M120 180 C80 140, 40 240, 70 320 C100 290, 140 280, 160 300 C130 260, 120 220, 120 180 Z" fill="#7a1212" opacity="0.8"/>
    
    <!-- Dragon Wing (Right/Main) -->
    <path d="M280 120 C380 60, 460 220, 420 360 C380 300, 310 320, 270 360 C320 280, 310 180, 280 120 Z" fill="url(#goldGlow)"/>

    <!-- Dragon Body & Neck -->
    <path d="M160 420 C180 340, 210 240, 180 180 C190 200, 240 220, 260 300 C270 350, 290 400, 320 440 C250 460, 180 450, 160 420 Z" fill="#a31d1d" />
    
    <!-- Spine Scales -->
    <path d="M168 380 L155 375 L173 350 L160 345 L180 320" stroke="url(#goldGlow)" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M180 280 L170 270 L188 245 L178 235 L190 210" stroke="url(#goldGlow)" stroke-width="6" stroke-linecap="round" fill="none"/>

    <!-- Roaring Dragon Head -->
    <path d="M180 180 C170 140, 190 100, 230 80 C240 75, 255 70, 265 85 C250 90, 240 105, 245 120 C255 110, 275 105, 290 115 C295 120, 280 130, 270 135 C285 140, 305 145, 300 160 C290 165, 275 160, 260 160 C275 175, 265 190, 250 195 C235 200, 200 200, 180 180 Z" fill="url(#goldGlow)" />

    <!-- Horns -->
    <path d="M220 85 C210 50, 180 30, 150 25 C175 40, 195 65, 210 82 Z" fill="#ffd700" />
    <path d="M200 95 C192 70, 172 55, 148 50 C168 62, 182 82, 192 92 Z" fill="#a31d1d" opacity="0.9" />

    <!-- Eye (Glowing Yellow) -->
    <circle cx="225" cy="115" r="7" fill="#ffffff" />
    <circle cx="225" cy="115" r="12" fill="none" stroke="#ffaa00" stroke-width="2" />

    <!-- Fiery Ember Sparks shooting from mouth -->
    <path d="M285 145 L340 135 M275 155 L350 165 M280 150 L380 140" stroke="#ffd700" stroke-width="4" stroke-linecap="round" opacity="0.9" />
    <circle cx="360" cy="135" r="8" fill="#ffd700" opacity="0.8" />
    <circle cx="390" cy="155" r="5" fill="#ff7700" opacity="0.6" />
    <circle cx="330" cy="175" r="10" fill="#a31d1d" opacity="0.7" />
  </g>
</svg>